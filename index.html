<!DOCTYPE html>
<html>
<head>
  <title>Zephyrs seco project</title>
  <style>
    canvas {
      border: 1px solid black;
    }
  canvas {
  background-image: url('file:///storage/emulated/0/images/html.gif');
  background-size: cover;
}

  </style>
</head>
<body>
  
<canvas id="gameCanvas" width="600" height="400"></canvas>
<button id="start-button" style="position: absolute; top: 200px; left: 275px; width: 50px; height: 50px; border-radius: 50%; background-color: #4CAF50; color: #fff; border: none; cursor: pointer;">Start</button>
<button id="second-button" style="position: absolute; top: 300px; left: 275px; width: 50px; height: 50px; background-color: #0000ff; color: #fff; border: none; cursor: pointer;"></button>
<button id="triangle-button" style="position: absolute; top: 50px; left: 275px; width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-bottom: 50px solid black; background-color: transparent; border-top: none; cursor: pointer;"></button>
<button id="orange-button" style="position: absolute; top: 300px; left: 210px; width: 50px; height: 50px; background-color: orange; border: none; cursor: pointer;"></button>
<button id="paddle2-up-button" style="position: absolute; top: 50px; left: 355px; width: 50px; height: 50px; background-color: #ff00ff; color: #fff; border: none; cursor: pointer;">Up</button>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let ballX = canvas.width / 2;
    let ballY = canvas.height / 2;
    let ballSpeedX = 10;
    let ballSpeedY = 10;
    let ballRadius = 10;

    let paddle1Y = canvas.height / 2;
    let paddle2Y = canvas.height / 2;
    let paddleWidth = 10;
    let paddleHeight = 200;
    let paddleSpeed = 5;
     
  let paddle3Width = paddleWidth;
  let paddle3Height = paddleHeight;
  let paddle3Y = canvas.height / 2;
  let paddle3X = canvas.width - paddleWidth * 3;
  let paddle3Direction = 1;
    
  let score1 = 0;
  let score2 = 0;
  let gameRunning = true;

// In your loop function
function loop() {
  if (gameRunning) {
    update();
    draw();
  }
  requestAnimationFrame(loop);
}

// To pause the game
function pauseGame() {
  gameRunning = false;
}

// To resume the game
function resumeGame() {
  gameRunning = true;
}
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'brown';
      ctx.fillRect(0, paddle1Y - paddleHeight / 2, paddleWidth, paddleHeight);
      ctx.fillRect(canvas.width - paddleWidth, paddle2Y - paddleHeight / 2, paddleWidth, paddleHeight);
      ctx.beginPath();
      ctx.arc(ballX, ballY, ballRadius, 0, 2 * Math.PI);
      ctx.fill();
      ctx.font = '24px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(`Score: ${score1}`, 10, 10);
      ctx.textAlign = 'right';
      ctx.fillText(`Score: ${score2}`, canvas.width - 10, 10);
      ctx.fillStyle = 'blue';
      ctx.fillRect(paddle3X, paddle3Y - paddle3Height / 2, paddle3Width, paddle3Height);
      ctx.fillStyle = 'black';
    }

    function update() {
 
  if (!gameRunning) return;
      ballX += ballSpeedX;
      ballY += ballSpeedY;

      if (ballY < 0 || ballY > canvas.height) {
        ballSpeedY = -ballSpeedY;
      }

      if (ballX < paddleWidth && ballY > paddle1Y - paddleHeight / 2 && ballY < paddle1Y + paddleHeight / 2) {
        ballSpeedX = -ballSpeedX;
      } else if (ballX > canvas.width - paddleWidth - ballRadius && ballY > paddle2Y - paddleHeight / 2 && ballY < paddle2Y + paddleHeight / 2) {
        ballSpeedX = -ballSpeedX;
      }

      if (ballX < 0) {
        score2++;
        ballX = canvas.width / 2;
        ballY = canvas.height / 2;
      } else if (ballX > canvas.width) {
        score1++;
        ballX = canvas.width / 2;
        ballY = canvas.height / 2;
      }
        paddle3Y += paddleSpeed * paddle3Direction;

if (paddle3Y - paddle3Height / 2 < 0) {
  paddle3Y = paddle3Height / 2;
  paddle3Direction = 1;
} else if (paddle3Y + paddle3Height / 2 > canvas.height) {
  paddle3Y = canvas.height - paddle3Height / 2;
  paddle3Direction = -1;
}
  else if (ballX > paddle3X - ballRadius && ballY > paddle3Y - paddle3Height / 2 && ballY < paddle3Y + paddle3Height / 2) {
  ballSpeedX = -ballSpeedX;
}
    }

    function handleInput(event) {
      if (event.key === 'w') {
        paddle1Y -= paddleSpeed*25;
      } else if (event.key === 's') {
        paddle1Y += paddleSpeed*25;
      } else if (event.key === 'ArrowUp') {
        paddle1Y -= paddleSpeed*25;
      } else if (event.key === 'ArrowDown') {
        paddle1Y += paddleSpeed*25;
      }
    }

    document.addEventListener('keydown', handleInput);

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  
 // const startButton = document.getElementById('start-button');
//startButton.addEventListener('click', () => {let gameRunning = false;
//const startButton = document.getElementById('start-button');});
//startButton.addEventListener('click', () => {
  //if (!gameRunning) {
    //gameRunning = true;
   // loop();
    //startButton.textContent = 'Pause';
  //} else {
   // gameRunning = false;
    //startButton.textContent = 'Start';
  //}
//});
  // Add your button click logic here

  const secondButton = document.getElementById('second-button');
secondButton.addEventListener('click', () => {
  
  paddle1Y -= paddleSpeed*25;
  if (paddle1Y - paddleHeight / 2 < 0) {
    paddle1Y = paddleHeight / 2;
  }
});

  const triangleButton = document.getElementById('triangle-button');
triangleButton.addEventListener('click', () => {
  paddle2Y += paddleSpeed*25;
  if (paddle2Y + paddleHeight / 2 > canvas.height) {
    paddle2Y = canvas.height - paddleHeight / 2;
  }
});
  const orangeButton = document.getElementById('orange-button');
orangeButton.addEventListener('click', () => {
  paddle1Y += paddleSpeed*25;
  if (paddle1Y + paddleHeight / 2 > canvas.height) {
    paddle1Y = canvas.height - paddleHeight / 2;
  }
});
  const paddle2UpButton = document.getElementById('paddle2-up-button');
paddle2UpButton.addEventListener('click', () => {
  paddle2Y -= paddleSpeed * 25;
  if (paddle2Y - paddleHeight / 2 < 0) {
    paddle2Y = paddleHeight / 2;
  }
});
  const startButton = document.getElementById('start-button');
startButton.addEventListener('click', () => {
  if (gameRunning) {
    gameRunning = false;
    startButton.textContent = 'Start';
  } else {
    gameRunning = true;
    startButton.textContent = 'Pause';
  }
});
  </script>
</body>
</html>
